{% block extra_css %}
<link rel="stylesheet" href="{% static 'homePage/gallery.css' %}">

<style>
  .gallery-section{max-width:1100px;margin:0 auto;padding:8px 16px 24px;}
  .gallery-grid{
    display:grid; gap:10px;
    grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  }
  .gallery-grid a{ position:relative;display:block;border-radius:12px;overflow:hidden;background:#f3f3f3; }
  .gallery-grid img{
    width:100%; height:100%; aspect-ratio:1/1; object-fit:cover;
    transition:transform .25s ease, filter .25s ease;
  }
  .gallery-grid a:hover img{ transform:scale(1.03); }

  /* לייטבוקס ללא טקסטים/פעולות */
  .lightbox{ position:fixed; inset:0; display:none; align-items:center; justify-content:center;
             background:rgba(0,0,0,.88); z-index:2000; }
  .lightbox.open{ display:flex; }
  .lb-inner{ position:relative; max-width:96vw; max-height:90vh; }
  .lb-img{
    max-width:96vw; max-height:90vh; object-fit:contain; display:block; border-radius:8px;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
  }
  .lb-btn{
    position:absolute; top:50%; transform:translateY(-50%);
    border:none; background:rgba(0,0,0,.5); color:#fff; width:44px; height:44px;
    border-radius:999px; cursor:pointer; font-size:22px; line-height:44px; text-align:center;
    user-select:none;
  }
  .lb-prev{ right:100%; margin-right:10px; }
  .lb-next{ left:100%;  margin-left:10px; }
  .lb-close{
    position:absolute; top:-12px; left:-12px; width:40px; height:40px; font-size:22px;
    border:none; background:rgba(0,0,0,.55); color:#fff; border-radius:999px; cursor:pointer;
  }
  .lb-overlay-click{ position:fixed; inset:0; }

  @media (max-width: 520px){
    .gallery-grid{ grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:8px; }
    .lb-btn{ width:40px; height:40px; font-size:20px; }
    .lb-prev{ margin-right:6px; } .lb-next{ margin-left:6px; }
  }
</style>
{% endblock %}

{% block scripts %}
<script>
(function(){
  const grid = document.getElementById('galleryGrid');
  const items = Array.from(grid.querySelectorAll('a'));
  const lb = document.getElementById('lightbox');
  const lbImg = document.getElementById('lbImg');
  const lbPrev = document.getElementById('lbPrev');
  const lbNext = document.getElementById('lbNext');
  let idx = 0, touchX = null;

  function openAt(i){
    idx = (i + items.length) % items.length;
    const a = items[idx];
    const full = a.getAttribute('href');
    const img = a.querySelector('img');
    lbImg.src = full;
    lbImg.alt = img.alt || '';
    // פרילוד לשכנים
    new Image().src = items[(idx+1)%items.length].href;
    new Image().src = items[(idx-1+items.length)%items.length].href;

    lb.classList.add('open');
    lbNext.focus({preventScroll:true});
    window.addEventListener('keydown', onKey);
  }

  function close(){
    lb.classList.remove('open');
    lbImg.src = '';
    window.removeEventListener('keydown', onKey);
  }

  function next(){ openAt(idx+1); }
  function prev(){ openAt(idx-1); }

  function onKey(e){
    if(e.key === 'Escape'){ close(); }
    else if(e.key === 'ArrowRight'){ next(); }
    else if(e.key === 'ArrowLeft'){ prev(); }
    else if(e.key === 'Home'){ openAt(0); }
    else if(e.key === 'End'){ openAt(items.length-1); }
  }

  items.forEach((a, i) => {
    a.addEventListener('click', (ev) => {
      ev.preventDefault();
      openAt(i);
    });
  });

  document.querySelectorAll('[data-close]').forEach(el => el.addEventListener('click', close));
  lbNext.addEventListener('click', next);
  lbPrev.addEventListener('click', prev);

  document.getElementById('lbInner').addEventListener('click', (e) => e.stopPropagation());

  lb.addEventListener('touchstart', (e) => { touchX = e.changedTouches[0].clientX; }, {passive:true});
  lb.addEventListener('touchend', (e) => {
    if(touchX == null) return;
    const dx = e.changedTouches[0].clientX - touchX;
    if(Math.abs(dx) > 40){ dx < 0 ? next() : prev(); }
    touchX = null;
  }, {passive:true});
})();
</script>
